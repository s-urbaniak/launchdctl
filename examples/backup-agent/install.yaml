agent:
  label: com.example.backup-agent
  domain: user

program:
  argv:
    - ~/Library/Application Support/backup-agent/bin/backup-agent
    - run
    - --config
    - ~/Library/Application Support/backup-agent/config/config.yaml
  working_directory: ~/Library/Application Support/backup-agent

logging:
  stdout_path: ~/Library/Application Support/backup-agent/logs/launchd.stdout.log
  stderr_path: ~/Library/Application Support/backup-agent/logs/launchd.stderr.log

service:
  run_at_load: false
  keep_alive: false
  start_calendar_interval:
    - hour: 2
      minute: 0

install:
  validate_plist: true
  bootout_existing: true
  bootstrap: true
  kickstart_after_bootstrap: false
